<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Admin – Was vom Hafen bleibt</title>
<style>
  :root { --blau: #4A27EA; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px 18px;
    font-family: Helvetica, Arial, sans-serif;
    color: #1a1a1a; background: #f4f3ef;
    max-width: 720px; margin-inline: auto;
  }
  h1 { font-size: 19px; color: var(--blau); margin: 0 0 4px; }
  .unter { color: #666; font-size: 13px; margin: 0 0 22px; }

  .login { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
  input[type=password] {
    flex: 1; min-width: 170px; padding: 11px 12px;
    border: 1px solid var(--blau); font-size: 15px; background: #fff;
  }
  button {
    border: none; cursor: pointer; font-size: 14px;
    padding: 11px 16px; background: var(--blau); color: #fff;
  }
  button.sek { background: #fff; color: var(--blau); border: 1px solid var(--blau); }
  button:disabled { opacity: .5; cursor: default; }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .tabs button { background: #fff; color: var(--blau); border: 1px solid var(--blau); }
  .tabs button.aktiv { background: var(--blau); color: #fff; }

  .karte { background: #fff; padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .karte .station { color: var(--blau); font-weight: bold; font-size: 13px; }
  .karte .text { font-size: 15px; line-height: 1.4; white-space: pre-wrap; margin-top: 6px; }
  .karte .meta { font-size: 12px; color: #666; margin-top: 6px; }
  .karte .aktionen { display: flex; gap: 8px; margin-top: 10px; }
  .karte .frei { background: #1f9d55; }
  .karte .del  { background: #c0392b; }

  .hinweis { color: #666; font-size: 14px; padding: 24px 0; text-align: center; }
  .fehler  { color: #c0392b; font-size: 14px; margin-bottom: 12px; }
</style>
</head>
<body>

  <h1>Admin – Was vom Hafen bleibt</h1>
  <p class="unter">Kommentare freischalten oder löschen.</p>

  <div class="login" id="login">
    <input type="password" id="pw" placeholder="Passwort" autocomplete="current-password">
    <button id="anmelden">Anmelden</button>
  </div>

  <div id="app" style="display:none;">
    <div class="tabs">
      <button id="tab-offen" class="aktiv">Offen</button>
      <button id="tab-frei" class="sek">Freigegeben</button>
      <button id="neu" class="sek">Neu laden</button>
      <button id="abmelden" class="sek" style="margin-left:auto;">Abmelden</button>
    </div>
    <div id="fehler" class="fehler" style="display:none;"></div>
    <div id="liste"></div>
  </div>

  <!-- Stationsnamen für die Anzeige -->
  <script src="stations.js"></script>
  <script>
  // Identisch zu script.js – öffentliche Keys, dürfen im Code stehen
  const SUPABASE_URL = 'https://frxclqyeimupmaiuvndl.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_zeBajWW8Ab2TjAYboip_yg_il422nwf';
  const SB_HEADERS = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  };
  const ADMIN_PW = 'hafen2026';

  let modus = 'offen';
  const $ = id => document.getElementById(id);

  function escHtml(t) {
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function stationName(id) {
    const s = (window.stations || []).find(s => s.id === id);
    return s ? s.name.replace(/\u00AD/g, '') : 'Station ' + id;
  }
  function zeigeFehler(msg) {
    const f = $('fehler');
    if (!msg) { f.style.display = 'none'; return; }
    f.textContent = msg; f.style.display = 'block';
  }

  async function laden() {
    zeigeFehler('');
    $('liste').innerHTML = '<p class="hinweis">Lädt…</p>';
    try {
      const filter = modus === 'offen' ? 'freigegeben=eq.false' : 'freigegeben=eq.true';
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/kommentare?${filter}&order=erstellt_am.desc`,
        { headers: SB_HEADERS }
      );
      if (!res.ok) throw new Error('Status ' + res.status);
      render(await res.json());
    } catch (e) {
      zeigeFehler('Laden fehlgeschlagen: ' + e.message);
      $('liste').innerHTML = '';
    }
  }

  function render(daten) {
    if (!daten.length) {
      $('liste').innerHTML = '<p class="hinweis">Keine '
        + (modus === 'offen' ? 'offenen' : 'freigegebenen') + ' Kommentare.</p>';
      return;
    }
    $('liste').innerHTML = daten.map(k => `
      <div class="karte" data-id="${k.id}">
        <div class="station">${escHtml(stationName(k.station_id))}</div>
        <div class="text">${escHtml(k.text)}</div>
        <div class="meta">${escHtml(k.name || 'Anonym')} · ${escHtml(k.datum || '')}</div>
        <div class="aktionen">
          ${modus === 'offen' ? `<button class="frei" data-akt="frei" data-id="${k.id}">✓ Freischalten</button>` : ''}
          <button class="del" data-akt="del" data-id="${k.id}">✕ Löschen</button>
        </div>
      </div>`).join('');

    $('liste').querySelectorAll('button[data-akt]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        btn.disabled = true;
        try {
          if (btn.dataset.akt === 'frei') {
            const r = await fetch(`${SUPABASE_URL}/rest/v1/kommentare?id=eq.${id}`, {
              method: 'PATCH', headers: SB_HEADERS,
              body: JSON.stringify({ freigegeben: true })
            });
            if (!r.ok) throw new Error('Status ' + r.status);
          } else {
            if (!confirm('Kommentar wirklich löschen?')) { btn.disabled = false; return; }
            const r = await fetch(`${SUPABASE_URL}/rest/v1/kommentare?id=eq.${id}`, {
              method: 'DELETE', headers: SB_HEADERS
            });
            if (!r.ok) throw new Error('Status ' + r.status);
          }
          const karte = btn.closest('.karte');
          karte.style.transition = 'opacity .25s';
          karte.style.opacity = '0';
          setTimeout(() => {
            karte.remove();
            if (!$('liste').querySelector('.karte')) laden();
          }, 250);
        } catch (e) {
          zeigeFehler('Aktion fehlgeschlagen: ' + e.message);
          btn.disabled = false;
        }
      });
    });
  }

  function einloggen() {
    $('login').style.display = 'none';
    $('app').style.display = 'block';
    laden();
  }

  $('anmelden').addEventListener('click', () => {
    if ($('pw').value.trim() !== ADMIN_PW) { alert('Falsches Passwort'); return; }
    sessionStorage.setItem('hafen_admin', '1');
    einloggen();
  });
  $('pw').addEventListener('keydown', e => { if (e.key === 'Enter') $('anmelden').click(); });

  $('abmelden').addEventListener('click', () => {
    sessionStorage.removeItem('hafen_admin');
    $('app').style.display = 'none';
    $('login').style.display = 'flex';
    $('pw').value = '';
  });
  $('neu').addEventListener('click', laden);

  $('tab-offen').addEventListener('click', () => {
    modus = 'offen';
    $('tab-offen').classList.add('aktiv'); $('tab-offen').classList.remove('sek');
    $('tab-frei').classList.remove('aktiv'); $('tab-frei').classList.add('sek');
    laden();
  });
  $('tab-frei').addEventListener('click', () => {
    modus = 'frei';
    $('tab-frei').classList.add('aktiv'); $('tab-frei').classList.remove('sek');
    $('tab-offen').classList.remove('aktiv'); $('tab-offen').classList.add('sek');
    laden();
  });

  // Falls in dieser Sitzung bereits angemeldet
  if (sessionStorage.getItem('hafen_admin') === '1') einloggen();
  </script>
</body>
</html>
