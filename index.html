<script>
(function() {
  const intro     = document.getElementById('intro');
  const hgEl      = document.getElementById('intro-hintergrund');
  const riverEl   = document.getElementById('intro-river');
  const pullArea  = document.getElementById('intro-pull-area');
  const pullArrow = document.getElementById('intro-pull-arrow');
  const gyroBtn   = document.getElementById('intro-gyro-btn');

  const W = window.innerWidth;
  const H = window.innerHeight;

  // ── HINTERGRUND-TEXT ──
  const woerter = ['WAS', 'VOM', 'HAFEN', 'BLEIBT'];
  const slots = woerter.map(() => ({ x: Math.random() * W * 0.7, y: Math.random() * H * 0.7 + H * 0.05 }));
  slots.sort((a, b) => a.x - b.x);

  const wortData = [];
  slots.forEach((slot, i) => {
    const el = document.createElement('div');
    el.className = 'wort-block';
    el.textContent = woerter[i];
    el.style.zIndex = 4; // immer über den Fotos
    hgEl.appendChild(el);

    wortData.push({
      el,
      x: slot.x,
      y: slot.y,
      speed: 0.15 + Math.random() * 0.2,
      dAmp: 6 + Math.random() * 10,
      dFreq: 0.0005 + Math.random() * 0.0004,
      dOff: Math.random() * Math.PI * 2
    });
  });

  // ── FLOATING CONTAINERS ──
  const fotos = (typeof stations !== 'undefined')
    ? stations.filter(s => s.foto).map(s => s.foto) : [];
  const anzahl = Math.max(6, fotos.length);
  // Basis-"Fläche" = SIZE². Fensterabhängig, aber mit Min/Max in px (clamp),
  // damit die Fotos auf Handy und Laptop gleichermaßen stimmig wirken.
  const INTRO_PREF_VW = 27;   // bevorzugte Größe als Fensteranteil (vw)
  const INTRO_MIN_PX  = 150;  // niemals kleiner (schmale Handys)
  const INTRO_MAX_PX  = 300;  // niemals größer (breite Laptops)
  const SIZE = Math.max(INTRO_MIN_PX, Math.min(INTRO_MAX_PX, W * INTRO_PREF_VW / 100));
  const containerData = [];

  for (let i = 0; i < anzahl; i++) {
    const fotoSrc = fotos[i % Math.max(fotos.length, 1)];
    const startX  = W * 0.38 + Math.random() * (W * 0.55);  // Fotos nach rechts – Text links frei
    const startY  = (i / anzahl) * H * 1.6 + Math.random() * 60;
    const speed   = 0.25 + Math.random() * 0.35;
    const dAmp    = 8 + Math.random() * 14;
    const dFreq   = 0.0008 + Math.random() * 0.0006;
    const dOff    = Math.random() * Math.PI * 2;

    const el = document.createElement('div');
    el.className = 'intro-container';
    el.style.zIndex = 3;
    el.style.left   = startX + 'px';
    el.style.top    = startY + 'px';
    el.style.width  = SIZE + 'px';
    el.style.height = SIZE + 'px';

    if (fotoSrc) {
      const img = document.createElement('img');
      img.src = fotoSrc;
      img.addEventListener('load', () => {
        const ratio = img.naturalHeight / img.naturalWidth;
        const sqrtR = Math.sqrt(ratio);
        const cw = Math.round(SIZE / sqrtR);
        const ch = Math.round(SIZE * sqrtR);
        el.style.width  = cw + 'px';
        el.style.height = ch + 'px';
        const d = containerData.find(c => c.el === el);
        if (d) { d.cw = cw; d.ch = ch; }
      });
      el.appendChild(img);
    }

    riverEl.appendChild(el);
    containerData.push({ el, x: startX, y: startY, speed, dAmp, dFreq, dOff, cw: SIZE, ch: SIZE });
  }

  // ── SENSOR ──
  let tiltZiel = 0;   // roher Zielwert (-1..1) von Maus oder Sensor
  let tiltX    = 0;   // geglätteter Wert, der die Bewegung steuert
  // Maus-Parallax nur auf echten Zeigegeräten – auf Touch-Geräten erzeugt
  // ein synthetisches mousemove beim Tippen sonst einen falschen Anfangsruck.
  if (!(('ontouchstart' in window) || navigator.maxTouchPoints > 0)) {
    document.addEventListener('mousemove', e => { tiltZiel = (e.clientX / W - 0.5) * 2; });
  }

  // Ausschlag der Neigung – skaliert mit der Bildschirmbreite, damit es auf
  // dem Handy spürbar ist. Container bewegen sich stärker als die Wörter (Parallax).
  const TILT_CONTAINER = Math.max(80, W * 0.28);
  const TILT_WORT      = Math.max(45, W * 0.15);

  let gyroAktiv = false;
  function aktiviereGyro() {
    if (gyroAktiv) return;
    gyroAktiv = true;

    let motionOk = false;

    // Hauptquelle: devicemotion feuert kontinuierlich (zuverlässig auf iOS).
    // accelerationIncludingGravity.x ≈ -9.8..9.8 → Neigung links/rechts.
    // Voller Ausschlag bei ~5 (entspricht ca. 30° Kippen).
    window.addEventListener('devicemotion', e => {
      const g = e.accelerationIncludingGravity;
      if (!g || g.x == null) return;
      motionOk = true;
      tiltZiel = Math.max(-1, Math.min(1, g.x / 5));    // Bewegung folgt der Kipprichtung
    });

    // Fallback: deviceorientation (gamma). Nur aktiv, solange devicemotion
    // noch keine Daten liefert.
    window.addEventListener('deviceorientation', e => {
      if (motionOk || e.gamma == null) return;
      tiltZiel = Math.max(-1, Math.min(1, -e.gamma / 25));
    });
  }

  // Feature-Detection statt UA-String: iPadOS 13+ meldet sich als "Macintosh",
  // maxTouchPoints fängt das ab.
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  const brauchtFreigabe = typeof DeviceOrientationEvent !== 'undefined'
    && typeof DeviceOrientationEvent.requestPermission === 'function';

  if (brauchtFreigabe || isTouch) {
    gyroBtn.style.display = 'block';
  } else {
    // Desktop: Maus steuert die Neigung bereits.
    aktiviereGyro();
  }

  let freigabeAngefragt = false;
  function gyroFreigeben(ev) {
    if (ev) ev.stopPropagation();          // verhindert, dass der Tap das Intro wegzieht
    if (freigabeAngefragt) return;
    freigabeAngefragt = true;
    if (brauchtFreigabe) {
      DeviceOrientationEvent.requestPermission()
        .then(s => { if (s === 'granted') aktiviereGyro(); })
        .catch(() => {});
    } else {
      aktiviereGyro();
    }
    gyroBtn.style.display = 'none';
  }
  gyroBtn.addEventListener('touchstart', ev => ev.stopPropagation(), { passive: true });
  gyroBtn.addEventListener('click', gyroFreigeben);

  // ── ANIMATION ──
  let introGone = false;
  let lastTime  = null;

  function animate(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(ts - lastTime, 50);
    lastTime = ts;

    // Sensorwert weich nachziehen → flüssige, nicht zappelige Bewegung
    tiltX += (tiltZiel - tiltX) * 0.10;

    containerData.forEach(c => {
      c.y -= c.speed * (dt / 16);
      if (c.y + c.ch < -20) { c.y = H + Math.random() * 80; c.x = Math.random() * (W - c.cw); }
      const wave   = Math.sin(ts * c.dFreq + c.dOff) * c.dAmp;
      const sensor = tiltX * TILT_CONTAINER;
      c.el.style.left = (c.x + wave + sensor) + 'px';
      c.el.style.top  = c.y + 'px';
    });

    wortData.forEach(w => {
      w.y -= w.speed * (dt / 16);
      if (w.y < -120) { w.y = H + Math.random() * 60; w.x = Math.random() * W * 0.7; }
      const wave   = Math.sin(ts * w.dFreq + w.dOff) * w.dAmp;
      const sensor = tiltX * TILT_WORT;
      w.el.style.left = (w.x + wave + sensor) + 'px';
      w.el.style.top  = w.y + 'px';
    });

    if (!introGone) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  // ── PULL ──
  let dragging = false, startY_ = 0, currentDy = 0;
  const THRESHOLD = 80;

  function getY(e) { return e.touches ? e.touches[0].clientY : e.clientY; }

  function onStart(e) {
    if (introGone) return;
    dragging = true; startY_ = getY(e);
    intro.style.transition = 'none';
    pullArrow.style.animation = 'none';
  }

  function onMove(e) {
    if (!dragging) return;
    currentDy = Math.max(0, startY_ - getY(e));
    intro.style.transform = `translateY(-${Math.min(currentDy, H) * 0.6}px)`;
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    if (currentDy > THRESHOLD) { dismiss(); }
    else {
      intro.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
      intro.style.transform = 'translateY(0)';
      pullArrow.style.animation = 'intro-bounce 2s ease-in-out infinite';
    }
    currentDy = 0;
  }

  function dismiss() {
    introGone = true;
    intro.style.transition = 'transform 0.7s cubic-bezier(0.77,0,0.18,1)';
    intro.style.transform = 'translateY(-100%)';
    gyroBtn.style.display = 'none';
    setTimeout(() => intro.classList.add('gone'), 750);
  }

  pullArea.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  intro.addEventListener('touchstart', onStart, { passive: true });
  document.addEventListener('touchmove', onMove, { passive: true });
  document.addEventListener('touchend', onEnd);
  pullArrow.addEventListener('click', dismiss);
  intro.addEventListener('click', () => { if (!dragging) dismiss(); });
})();
</script>
</body>
</html>
