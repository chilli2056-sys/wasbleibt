<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaffeekranz – Was vom Hafen bleibt</title>
  <link rel="stylesheet" href="style.css?v=6">
  <style>
    /* Blaues Fenster wie das Kommentarfeld */
    body { background: #4A27EA; }

    main { padding: 80px 24px 90px; max-width: 600px; margin: 0 auto; }

    main h1 {
      font-family: 'ABC Camera Rounded Plain Black Trial', Helvetica, Arial, sans-serif;
      font-size: 30px;
      line-height: 1.1;
      color: #fff;
      margin: 0 0 10px;
    }

    .kaffee-intro {
      font-family: 'ABC Camera Rounded Plain Bold Trial', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #fff;
      margin: 0 0 32px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-family: 'ABC Camera Rounded Plain Bold Trial', Helvetica, Arial, sans-serif;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 6px;
    }

    /* Felder hell wie im Kommentarfeld: weißer Grund, blaue Schrift */
    .form-group input,
    .form-group textarea {
      width: 100%;
      border: 1px solid #4A27EA;
      padding: 10px 12px;
      font-family: 'ABC Camera Rounded Plain Bold Trial', Helvetica, Arial, sans-serif;
      font-size: 15px;
      background: #fff;
      color: #4A27EA;
      box-sizing: border-box;
      resize: vertical;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(74, 39, 234, 0.5);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #4A27EA;
    }

    /* Senden-Button wie im Kommentarfeld: weiße Pille, blaue Schrift */
    #kontakt-senden {
      background: #fff;
      color: #4A27EA;
      border: 1px solid #fff;
      border-radius: 999px !important;
      padding: 12px 32px;
      font-family: 'ABC Camera Rounded Plain Bold Trial', Helvetica, Arial, sans-serif;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      margin-top: 8px;
    }

    #kontakt-senden:hover { background: #ece8ff; }

    #kontakt-bestaetigung {
      margin-top: 14px;
      font-family: 'ABC Camera Rounded Plain Bold Trial', Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #fff;
    }

    /* Footer-Links auf blauem Grund lesbar */
    .footer-link { color: #fff; }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="index.html">Karte</a>
    <a href="archiv.html">Archiv</a>
    <a href="#">Kaffeekranz</a>
  </nav>
</header>

<main>

  <h1>Kaffeekranz</h1>
  <p class="kaffee-intro">Schreib mir, ich freue mich über neue Orte, Geschichten und Erinnerungen zum Hafen.</p>

  <form id="kontakt-form">

    <div class="form-group">
      <label for="f-name">Name</label>
      <input type="text" id="f-name" name="name" placeholder="Dein Name" autocomplete="name" />
    </div>

    <div class="form-group">
      <label for="f-email">E-Mail</label>
      <input type="email" id="f-email" name="email" placeholder="deine@email.de" autocomplete="email" />
    </div>

    <div class="form-group">
      <label for="f-betreff">Betreff</label>
      <input type="text" id="f-betreff" name="betreff" placeholder="Worum geht es?" />
    </div>

    <div class="form-group">
      <label for="f-nachricht">Nachricht</label>
      <textarea id="f-nachricht" name="nachricht" rows="6" placeholder="Deine Nachricht…"></textarea>
    </div>

    <button type="submit" id="kontakt-senden">Senden</button>
    <p id="kontakt-bestaetigung"></p>

  </form>

</main>

<footer>
  <div class="footer-content">
    <a href="about.html" class="footer-link">About</a>
    <a href="impressum.html" class="footer-link">Impressum</a>
    <a href="datenschutz.html" class="footer-link">Datenschutz</a>
  </div>
</footer>

<script>
  document.getElementById('kontakt-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('f-name').value.trim();
    const email = document.getElementById('f-email').value.trim();
    const nachricht = document.getElementById('f-nachricht').value.trim();

    if (!name || !email || !nachricht) {
      document.getElementById('kontakt-bestaetigung').textContent = 'Bitte fülle Name, E-Mail und Nachricht aus.';
      return;
    }

    // ▼▼▼ HIER deine echte E-Mail-Adresse eintragen ▼▼▼
    const EMPFAENGER = 'DEINE@EMAIL.DE';
    // ▲▲▲ sonst geht die Anfrage ins Leere ▲▲▲

    const betreff = encodeURIComponent(document.getElementById('f-betreff').value || 'Nachricht vom Kaffeekranz');
    const body = encodeURIComponent(`Name: ${name}\nE-Mail: ${email}\n\n${nachricht}`);
    window.location.href = `mailto:${EMPFAENGER}?subject=${betreff}&body=${body}`;

    document.getElementById('kontakt-bestaetigung').textContent = '✓ Dein E-Mail-Programm öffnet sich gleich.';
  });
</script>

</body>
</html>
